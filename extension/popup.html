<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>scrollNote Extension</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                width: 320px;
                min-height: 400px;
                background: #ffffff;
                color: #111827;
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                font-size: 14px;
            }

            .header {
                background: #f8f9fa;
                padding: 16px;
                border-bottom: 1px solid #e5e7eb;
                display: flex;
                align-items: center;
                gap: 8px;
            }

            .logo {
                width: 24px;
                height: 24px;
                border-radius: 4px;
                background: #111827;
            }

            .logo-text {
                font-size: 16px;
                font-weight: 600;
                color: #111827;
            }

            .content {
                padding: 16px;
            }

            .auth-form {
                display: block;
            }

            .user-section {
                display: none;
            }

            input,
            button {
                width: 100%;
                margin: 8px 0;
                padding: 12px;
                border: none;
                border-radius: 6px;
                font-size: 14px;
                font-family: inherit;
            }

            input {
                background: #ffffff;
                color: #111827;
                border: 1px solid #d1d5db;
            }

            input:focus {
                outline: none;
                border-color: #3b82f6;
                box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            }

            input::placeholder {
                color: #9ca3af;
            }

            button {
                cursor: pointer;
                font-weight: 500;
                transition: all 0.2s ease;
            }

            #signIn, #viewNotes, #saveSettings {
                background: #111827;
                color: #ffffff;
                box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            }

            #signIn:hover, #viewNotes:hover, #saveSettings:hover {
                background: #1f2937;
            }

            #signUp, #signOut, #resetSettings {
                background: transparent;
                color: #4b5563;
                border: 1px solid #e5e7eb;
            }

            #signUp:hover, #signOut:hover, #resetSettings:hover {
                background: #f3f4f6;
                color: #111827;
            }

            .user-info {
                text-align: center;
                margin-bottom: 16px;
                padding: 16px;
                background: #f8f9fa;
                border-radius: 8px;
                border: 1px solid #e5e7eb;
            }

            .user-email {
                color: #4b5563;
                font-size: 13px;
                margin-bottom: 12px;
            }

            .welcome-message {
                text-align: center;
                color: #4b5563;
                margin-bottom: 20px;
                line-height: 1.5;
            }

            .settings-btn {
                background: transparent;
                color: #6b7280;
                border: none;
                padding: 4px;
                cursor: pointer;
                margin-left: auto;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .settings-btn:hover {
                color: #111827;
            }

            .settings-section {
                display: none;
                margin-top: 16px;
                padding-top: 16px;
                border-top: 1px solid #e5e7eb;
            }

            .settings-section.visible {
                display: block;
            }

            .settings-title {
                font-size: 14px;
                font-weight: 600;
                color: #111827;
                margin-bottom: 12px;
            }

            .settings-input {
                font-size: 13px;
                padding: 10px;
                margin: 4px 0 12px;
            }

            .settings-label {
                font-size: 12px;
                color: #4b5563;
                font-weight: 500;
                margin-bottom: 2px;
            }

            .settings-actions {
                display: flex;
                gap: 8px;
                margin-top: 8px;
            }

            .settings-actions button {
                flex: 1;
                font-size: 13px;
                padding: 10px;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <svg
                class="logo"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
            >
                <rect width="24" height="24" rx="4" fill="#ffffff" />
                <text
                    x="12"
                    y="17"
                    font-family="sans-serif"
                    font-size="14"
                    font-weight="bold"
                    fill="#000000"
                    text-anchor="middle"
                >
                    S
                </text>
            </svg>
            <span class="logo-text">scrollNote</span>
            <button id="settingsToggle" class="settings-btn" title="Settings">
                <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                >
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
                    ></path>
                </svg>
            </button>
        </div>

        <div class="content">
            <div id="authForm" class="auth-form">
                <div class="welcome-message">
                    Sign in to start capturing and organizing your web notes
                </div>
                <input type="email" id="email" placeholder="Email address" />
                <input type="password" id="password" placeholder="Password" />
                <button id="signIn">Sign In</button>
                <button id="signUp">Create Account</button>
            </div>

            <div id="userSection" class="user-section">
                <div class="user-info">
                    <div id="userEmail" class="user-email"></div>
                    <button id="viewNotes">View My Notes</button>
                    <button id="signOut">Sign Out</button>
                </div>
            </div>

            <div id="settingsSection" class="settings-section">
                <div class="settings-title">API Configuration</div>
                <div class="settings-label">Backend URL</div>
                <input
                    type="text"
                    id="apiUrlInput"
                    class="settings-input"
                    placeholder="http://localhost:5000"
                />
                <div class="settings-label">Website URL</div>
                <input
                    type="text"
                    id="websiteUrlInput"
                    class="settings-input"
                    placeholder="http://localhost:3000"
                />
                <div class="settings-actions">
                    <button id="saveSettings">Save</button>
                    <button id="resetSettings">Reset</button>
                </div>
            </div>
        </div>

        <script src="api-config.js"></script>
        <script src="popup.js"></script>
    </body>
</html>
